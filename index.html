<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metodologias Ativas: Aprender fazendo, ensinar transformando</title>
<link rel="icon" type="image/x-icon" href="https://www.cogna.com.br/favicon.ico">
<style>
  :root {
    --primary: #5219A1;
    --accent: #ffad01;
    --primary-light: #6d3fc0;
    --error: #d63333;
    --success: #2e9e5b;
    --bg: #f3f0fa;
    --text: #2c2340;
    --border: #d9d0ec;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, var(--bg) 0%, #ffffff 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  .card {
    max-width: 640px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 35px rgba(82, 25, 161, 0.15);
    overflow: hidden;
  }

  .card-header {
    background: linear-gradient(120deg, var(--primary) 0%, var(--primary-light) 100%);
    padding: 28px 32px;
    position: relative;
  }

  .card-header::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    height: 5px;
    width: 100%;
    background: var(--accent);
  }

  .card-header h1 {
    color: #fff;
    margin: 0 0 6px 0;
    font-size: 1.5rem;
  }

  .card-header p {
    color: #e6dcfa;
    margin: 0;
    font-size: 0.92rem;
  }

  .card-header .logo {
    height: 40px;
    max-width: 180px;
    object-fit: contain;
    display: block;
    margin-bottom: 14px;
  }

  form {
    padding: 28px 32px 32px 32px;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-weight: 600;
    font-size: 0.88rem;
    margin-bottom: 6px;
    color: var(--primary);
  }

  label .required {
    color: var(--accent);
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  select {
    width: 100%;
    padding: 11px 13px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    background: #fff;
    color: var(--text);
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(82, 25, 161, 0.15);
  }

  input.invalid, select.invalid {
    border-color: var(--error);
  }

  input.valid, select.valid {
    border-color: var(--success);
  }

  select:disabled,
  input:disabled {
    background: #f4f2f8;
    color: #9a90b0;
    cursor: not-allowed;
  }

  .hint {
    font-size: 0.78rem;
    margin-top: 5px;
    min-height: 14px;
  }

  .hint.error { color: var(--error); }
  .hint.ok { color: var(--success); }

  button[type="submit"] {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #4a2e00;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.1s, filter 0.15s;
  }

  button[type="submit"]:hover {
    filter: brightness(1.05);
  }

  button[type="submit"]:active {
    transform: translateY(1px);
  }

  button[type="submit"]:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  #formMsg {
    text-align: center;
    margin-top: 16px;
    font-weight: 600;
    display: none;
  }

  #formMsg.show { display: block; }
  #formMsg.success { color: var(--success); }
  #formMsg.error { color: var(--error); }

  .unidade-count {
    font-size: 0.78rem;
    color: #6b6280;
    margin-top: 5px;
  }

  /* ===================== Combobox (Unidade) ===================== */
  .combobox {
    position: relative;
  }

  .combobox-list {
    list-style: none;
    margin: 0;
    padding: 6px 0;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    max-height: 280px;
    overflow-y: auto;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 12px 30px rgba(82, 25, 161, 0.2);
    z-index: 30;
    display: none;
    -webkit-overflow-scrolling: touch;
  }

  .combobox-list.open {
    display: block;
  }

  .combobox-option {
    padding: 12px 14px;
    font-size: 0.92rem;
    cursor: pointer;
    line-height: 1.35;
  }

  .combobox-option.active,
  .combobox-option:hover {
    background: var(--bg);
  }

  .combobox-empty,
  .combobox-info {
    padding: 12px 14px;
    font-size: 0.85rem;
    color: #7a7090;
  }

  .combobox-info {
    border-top: 1px solid var(--border);
    font-style: italic;
  }

  /* Em telas pequenas, a lista vira um painel fixo (bottom sheet) para melhor toque */
  @media (max-width: 560px) {
    .combobox-list.open {
      position: fixed;
      left: 12px;
      right: 12px;
      top: auto;
      bottom: 12px;
      max-height: 55vh;
      box-shadow: 0 -8px 28px rgba(82, 25, 161, 0.3);
    }

    .combobox-option {
      padding: 14px 16px;
      font-size: 1rem;
    }
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <img src="https://portalinstitucional-assets.azureedge.net/strapi/assets/cogna_fd8c0b077b_1_7f0524b5f3.png" alt="Cogna" class="logo">
    <h1>Metodologias Ativas: Aprender fazendo, ensinar transformando</h1>
    <p>Preencha os campos abaixo com seus dados.</p>
  </div>

  <form id="pesquisaForm" novalidate>

    <div class="field">
      <label for="nomeCompleto">Nome Completo <span class="required">*</span></label>
      <input type="text" id="nomeCompleto" name="nomeCompleto" placeholder="Ex: Maria Silva" autocomplete="name">
      <div class="hint" id="nomeCompletoHint"></div>
    </div>

    <div class="field">
      <label for="cpf">CPF <span class="required">*</span></label>
      <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" inputmode="numeric" maxlength="14">
      <div class="hint" id="cpfHint"></div>
    </div>

    <div class="field">
      <label for="email">E-mail <span class="required">*</span></label>
      <input type="email" id="email" name="email" placeholder="nome@exemplo.com" autocomplete="email">
      <div class="hint" id="emailHint"></div>
    </div>

    <div class="field">
      <label for="telefone">Telefone / Celular <span class="required">*</span></label>
      <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" inputmode="numeric" maxlength="15">
      <div class="hint" id="telefoneHint"></div>
    </div>

    <div class="field">
      <label for="cargo">Cargo <span class="required">*</span></label>
      <input type="text" id="cargo" name="cargo" placeholder="Ex: Analista Administrativo" autocomplete="organization-title">
      <div class="hint" id="cargoHint"></div>
    </div>

    <div class="field">
      <label for="nomeGestor">Nome Completo do Gestor <span class="required">*</span></label>
      <input type="text" id="nomeGestor" name="nomeGestor" placeholder="Ex: João Souza">
      <div class="hint" id="nomeGestorHint"></div>
    </div>

    <div class="field">
      <label for="regional">Regional <span class="required">*</span></label>
      <select id="regional" name="regional">
        <option value="">Selecione a Regional...</option>
      </select>
      <div class="hint" id="regionalHint"></div>
    </div>

    <div class="field">
      <label for="unidade">Nome Unidade Sistema <span class="required">*</span></label>
      <div class="combobox" id="unidadeCombobox">
        <input type="text" id="unidade" name="unidade" placeholder="Selecione primeiro a Regional..." autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list" disabled>
        <ul class="combobox-list" id="unidadeList"></ul>
      </div>
      <div class="hint" id="unidadeHint"></div>
      <div class="unidade-count" id="unidadeCount"></div>
    </div>

    <button type="submit" id="submitBtn">Enviar Pesquisa</button>
    <div id="formMsg"></div>
  </form>
</div>

/* ===================== Combobox de Unidade (custom, mobile-friendly) ===================== */
function normalizarTexto(str) {
  var regexAcentos = new RegExp(String.fromCharCode(91, 92, 117, 48, 51, 48, 48, 45, 92, 117, 48, 51, 54, 102, 93), 'g');
  return str.normalize('NFD').replace(regexAcentos, '').toLowerCase().trim();
}

function filtrarUnidades(query) {
  const alvo = normalizarTexto(query);
  if (!alvo) return unidadesDaRegionalAtual;
  return unidadesDaRegionalAtual.filter(function(nome) {
    return normalizarTexto(nome).indexOf(alvo) !== -1;
  });
}

function renderizarListaUnidade() {
  const resultados = filtrarUnidades(unidadeEl.value);
  unidadeActiveIndex = -1;
  unidadeListEl.innerHTML = '';

  if (resultados.length === 0) {
    const li = document.createElement('li');
    li.className = 'combobox-empty';
    li.textContent = 'Nenhuma unidade encontrada.';
    unidadeListEl.appendChild(li);
    abrirListaUnidade();
    return;
  }

  const limitados = resultados.slice(0, MAX_RESULTADOS_UNIDADE);
  limitados.forEach(function(nome, idx) {
    const li = document.createElement('li');
    li.className = 'combobox-option';
    li.textContent = nome;
    li.setAttribute('data-idx', idx);
    li.addEventListener('mousedown', function(e) {
      e.preventDefault();
      selecionarUnidade(nome);
    });
    unidadeListEl.appendChild(li);
  });

  if (resultados.length > limitados.length) {
    const info = document.createElement('li');
    info.className = 'combobox-info';
    info.textContent = 'Mostrando ' + limitados.length + ' de ' + resultados.length + ' — continue digitando para refinar.';
    unidadeListEl.appendChild(info);
  }

  abrirListaUnidade();
}

function abrirListaUnidade() {
  unidadeListEl.classList.add('open');
  unidadeEl.setAttribute('aria-expanded', 'true');
}

function fecharListaUnidade() {
  unidadeListEl.classList.remove('open');
  unidadeListEl.innerHTML = '';
  unidadeEl.setAttribute('aria-expanded', 'false');
  unidadeActiveIndex = -1;
}

function selecionarUnidade(nome) {
  unidadeEl.value = nome;
  fecharListaUnidade();
  const ok = validarUnidade(unidadeEl.value);
  markField(unidadeEl, ok);
  setHint('unidadeHint', '', '');
  unidadeEl.focus();
}

function atualizarDestaqueUnidade() {
  const opcoes = unidadeListEl.querySelectorAll('.combobox-option');
  opcoes.forEach(function(el, i) {
    el.classList.toggle('active', i === unidadeActiveIndex);
  });
  if (unidadeActiveIndex >= 0 && opcoes[unidadeActiveIndex]) {
    opcoes[unidadeActiveIndex].scrollIntoView({ block: 'nearest' });
  }
}

unidadeEl.addEventListener('focus', function() {
  if (!unidadeEl.disabled) renderizarListaUnidade();
});

unidadeEl.addEventListener('keydown', function(e) {
  const opcoes = unidadeListEl.querySelectorAll('.combobox-option');
  if (!opcoes.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    unidadeActiveIndex = Math.min(unidadeActiveIndex + 1, opcoes.length - 1);
    atualizarDestaqueUnidade();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    unidadeActiveIndex = Math.max(unidadeActiveIndex - 1, 0);
    atualizarDestaqueUnidade();
  } else if (e.key === 'Enter') {
    if (unidadeActiveIndex >= 0 && opcoes[unidadeActiveIndex]) {
      e.preventDefault();
      selecionarUnidade(opcoes[unidadeActiveIndex].textContent);
    }
  } else if (e.key === 'Escape') {
    fecharListaUnidade();
  }
});

document.addEventListener('click', function(e) {
  if (!unidadeComboboxEl.contains(e.target)) {
    fecharListaUnidade();
  }
});

/* ===================== Helpers de validação ===================== */
function setHint(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'hint' + (type ? ' ' + type : '');
}

function markField(el, isValid) {
  el.classList.remove('valid', 'invalid');
  if (el.value.trim() === '') return;
  el.classList.add(isValid ? 'valid' : 'invalid');
}

/* Nome completo: exige ao menos nome + sobrenome (2 palavras com 2+ letras cada) */
function validarNomeCompleto(valor) {
  const nome = valor.trim().replace(/\s+/g, ' ');
  const partes = nome.split(' ').filter(function(p) { return p.length >= 2; });
  const regexLetras = /^[A-Za-zÀ-ÖØ-öø-ÿ' -]+$/;
  if (!regexLetras.test(nome)) return false;
  return partes.length >= 2;
}

/* CPF: aplica máscara e valida dígitos verificadores */
function mascaraCPF(valor) {
  let v = valor.replace(/\D/g, '').slice(0, 11);
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  return v;
}

function validarCPF(cpfFormatado) {
  const cpf = cpfFormatado.replace(/\D/g, '');
  if (cpf.length !== 11) return false;
  if (/^(\d)\1{10}$/.test(cpf)) return false;

  let soma = 0;
  for (let i = 0; i < 9; i++) soma += parseInt(cpf.charAt(i), 10) * (10 - i);
  let resto = (soma * 10) % 11;
  if (resto === 10 || resto === 11) resto = 0;
  if (resto !== parseInt(cpf.charAt(9), 10)) return false;

  soma = 0;
  for (let i = 0; i < 10; i++) soma += parseInt(cpf.charAt(i), 10) * (11 - i);
  resto = (soma * 10) % 11;
  if (resto === 10 || resto === 11) resto = 0;
  if (resto !== parseInt(cpf.charAt(10), 10)) return false;

  return true;
}

/* E-mail */
function validarEmail(valor) {
  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
  return regex.test(valor.trim());
}

/* Telefone: máscara (00) 00000-0000 ou (00) 0000-0000 */
function mascaraTelefone(valor) {
  let v = valor.replace(/\D/g, '').slice(0, 11);
  if (v.length > 10) {
    v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
  } else if (v.length > 5) {
    v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
  } else if (v.length > 2) {
    v = v.replace(/(\d{2})(\d{0,5})/, '($1) $2');
  } else if (v.length > 0) {
    v = v.replace(/(\d{0,2})/, '($1');
  }
  return v.trim();
}

function validarTelefone(valor) {
  const digitos = valor.replace(/\D/g, '');
  return digitos.length === 10 || digitos.length === 11;
}

});

emailEl.addEventListener('input', function() {
  const ok = validarEmail(emailEl.value);
  markField(emailEl, ok);
  setHint('emailHint', emailEl.value.trim() === '' ? '' : (ok ? '' : 'E-mail inválido.'), 'error');
});

telefoneEl.addEventListener('input', function() {
  telefoneEl.value = mascaraTelefone(telefoneEl.value);
  const ok = validarTelefone(telefoneEl.value);
  markField(telefoneEl, ok);
  setHint('telefoneHint', telefoneEl.value.trim() === '' ? '' : (ok ? '' : 'Telefone inválido.'), 'error');
});

cargoEl.addEventListener('input', function() {
  const ok = cargoEl.value.trim().length >= 2;
  markField(cargoEl, ok);
});

nomeGestorEl.addEventListener('input', function() {
  const ok = validarNomeCompleto(nomeGestorEl.value);
  markField(nomeGestorEl, ok);
  setHint('nomeGestorHint', nomeGestorEl.value.trim() === '' ? '' : (ok ? '' : 'Informe nome e sobrenome do gestor.'), 'error');
});

regionalEl.addEventListener('change', function() {
  markField(regionalEl, regionalEl.value !== '');
});

function validarUnidade(valor) {
  return valor.trim() !== '' && unidadesDaRegionalAtual.indexOf(valor.trim()) !== -1;
}

unidadeEl.addEventListener('input', function() {
  const ok = validarUnidade(unidadeEl.value);
  markField(unidadeEl, ok);
  setHint('unidadeHint', unidadeEl.value.trim() === '' ? '' : (ok ? '' : 'Selecione uma unidade válida da lista.'), 'error');
  renderizarListaUnidade();
});

/* ===================== Submit ===================== */
form.addEventListener('submit', function(e) {
  e.preventDefault();

  const validNome = validarNomeCompleto(nomeCompletoEl.value);
  const validCpf = validarCPF(cpfEl.value);
  const validEmail = validarEmail(emailEl.value);
  const validTelefone = validarTelefone(telefoneEl.value);
  const validCargo = cargoEl.value.trim().length >= 2;
  const validGestor = validarNomeCompleto(nomeGestorEl.value);
  const validRegional = regionalEl.value !== '';
  const validUnidade = validarUnidade(unidadeEl.value);

  markField(nomeCompletoEl, validNome);
  markField(cpfEl, validCpf);
  markField(emailEl, validEmail);
  markField(telefoneEl, validTelefone);
  markField(cargoEl, validCargo);
  markField(nomeGestorEl, validGestor);
  markField(regionalEl, validRegional);
  markField(unidadeEl, validUnidade);

  if (!validNome) setHint('nomeCompletoHint', 'Informe nome e sobrenome.', 'error');
  if (!validCpf) setHint('cpfHint', 'CPF inválido.', 'error');
  if (!validEmail) setHint('emailHint', 'E-mail inválido.', 'error');
  if (!validTelefone) setHint('telefoneHint', 'Telefone inválido.', 'error');
  if (!validGestor) setHint('nomeGestorHint', 'Informe nome e sobrenome do gestor.', 'error');
  if (!validRegional) setHint('regionalHint', 'Selecione uma regional.', 'error');
  if (!validUnidade) setHint('unidadeHint', 'Selecione uma unidade.', 'error');

  const tudoValido = validNome && validCpf && validEmail && validTelefone &&
                      validCargo && validGestor && validRegional && validUnidade;

  formMsg.classList.remove('show', 'success', 'error');

  if (!tudoValido) {
    formMsg.textContent = 'Por favor, corrija os campos destacados antes de enviar.';
    formMsg.classList.add('show', 'error');
    return;
  }

  const dados = {
    nomeCompleto: nomeCompletoEl.value.trim(),
    cpf: cpfEl.value,
    email: emailEl.value.trim(),
    telefone: telefoneEl.value,
    cargo: cargoEl.value.trim(),
    nomeGestor: nomeGestorEl.value.trim(),
    regional: regionalEl.value,
    unidade: unidadeEl.value
  };

  const urlGoogleScript = "https://script.google.com/macros/s/AKfycby9YNRP5mlFgGB-VQLzbUHeMrloCSxzbpU1zl2Fw7iuq01SN0pf2Lnzdb5GSS77olE/exec";

  const btnSubmit = document.getElementById('submitBtn');
  btnSubmit.textContent = 'Enviando...';
  btnSubmit.disabled = true;

  fetch(urlGoogleScript, {
      method: 'POST',
      mode: 'no-cors',
      headers: {
          'Content-Type': 'application/json'
      },
      body: JSON.stringify(dados)
  })
  .then(() => {
      formMsg.textContent = 'Pesquisa enviada com sucesso!';
      formMsg.classList.add('show', 'success');

      form.reset();
      unidadeEl.disabled = true;
      unidadeEl.placeholder = 'Selecione primeiro a Regional...';
      fecharListaUnidade();
      unidadesDaRegionalAtual = [];
      unidadeCountEl.textContent = '';
      document.querySelectorAll('input, select').forEach(function(el) {
        el.classList.remove('valid', 'invalid');
      });
      document.querySelectorAll('.hint').forEach(function(el) { el.textContent = ''; });
  })
  .catch(error => {
      console.error('Erro:', error);
      formMsg.textContent = 'Erro de conexão. Verifique sua internet.';
      formMsg.classList.add('show', 'error');
  })
  .finally(() => {
      btnSubmit.textContent = 'Enviar Pesquisa';
      btnSubmit.disabled = false;
  });
});
</script>

</body>
</html>
